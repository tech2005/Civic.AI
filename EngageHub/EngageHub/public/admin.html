<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Civic.AI Admin Portal</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary-bg: #4fb7d8;
            --secondary-bg: #63d2f0;
            --body-bg: #f4f7fb;
            --primary-gradient: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--body-bg);
            margin: 0; padding: 0;
        }

        /* --- Navbar (Same as complaint.html) --- */
        .header-inner { background: #fff; box-shadow: 0 2px 15px rgba(0,0,0,0.05); padding: 15px 0; }
        .logo-text { font-size: 24px; font-weight: 700; color: #333; margin: 0; text-decoration: none; }
        .logo-text span { color: #2ea6f7; }
        
        .nav-container { display: flex; justify-content: space-between; align-items: center; max-width: 1150px; margin: 0 auto; padding: 0 20px; }
        .menu { list-style: none; display: flex; gap: 25px; margin: 0; padding: 0; }
        .menu li a { text-decoration: none; color: #555; font-weight: 500; transition: 0.3s; font-size: 15px; }
        .menu li.active a { color: #2ea6f7; font-weight: 700; }
        .menu li a:hover { color: #2ea6f7; }

        .logout-btn { background: var(--primary-gradient); color: white; padding: 8px 20px; border-radius: 8px; text-decoration: none; font-weight: 600; font-size: 14px; box-shadow: 0 4px 10px rgba(79, 172, 254, 0.3); }

        /* --- Hero Header --- */
        .hero-header {
            background: var(--primary-gradient);
            padding: 60px 20px;
            text-align: center;
            color: white;
            margin-bottom: -40px;
        }
        .hero-header h1 { margin: 0; font-size: 32px; }

        .container { max-width: 1150px; margin: 30px auto; padding: 0 20px; position: relative; z-index: 5; }

        /* --- Map Section --- */
        #map { 
            height: 300px; width: 100%; border-radius: 16px; 
            margin-bottom: 30px; border: 5px solid white; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        /* --- Card & Table --- */
        .card {
            background: white; border-radius: 16px;
            padding: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.04);
            border: 1px solid #eee;
        }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px 10px; color: #7d8590; font-size: 11px; text-transform: uppercase; border-bottom: 2px solid #f0f0f0; }
        td { padding: 18px 10px; font-size: 13px; border-bottom: 1px solid #f9f9f9; }

        /* --- Elements --- */
        .dept-badge { background-color: #e3f2fd; color: #1976d2; padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; }
        .location-text { color: #4fb7d8; font-weight: 600; }
        
        .status-select { padding: 6px; border-radius: 8px; border: 1px solid #ddd; font-size: 12px; outline: none; background: #fdfdfd; }

        .delete-btn { background-color: #feeef0; color: #f55b5b; border: none; padding: 8px 15px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .delete-btn:hover { background-color: #f55b5b; color: white; }

        .thumb { width: 50px; height: 40px; border-radius: 6px; object-fit: cover; border: 1px solid #eee; }
        .sla-timer { font-size: 11px; font-weight: 700; }
    </style>
</head>
<body>

    <!-- Navbar Same as Complaint.html -->
    <header class="header-inner">
        <div class="nav-container">
            <div class="logo">
                <a href="index.html" class="logo-text">Civic<span>.AI</span></a>
            </div>
            <nav>
                <ul class="menu">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="complaint.html">Submit Complaint</a></li>
                    <li><a href="features.html">Features</a></li>
                    <li><a href="track.html">Track Complaint</a></li>
                    <li class="active"><a href="admin.html">Admin</a></li>
                </ul>
            </nav>
            <a href="login.html" class="logout-btn" onclick="localStorage.removeItem('token')">Logout</a>
        </div>
    </header>

    <div class="hero-header">
        <h1>Admin Control Center</h1>
        <p>Monitor real-time complaints and update resolution status</p>
    </div>

    <div class="container">
        <div id="map"></div>

        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h2 style="font-size:20px; color:#333; margin:0;">Active Complaints</h2>
                <div style="font-size:13px; color:#27ae60; font-weight:600;"><i class="fas fa-sync fa-spin"></i> Live Sync Active</div>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Dept.</th>
                        <th>Issue Details</th>
                        <th>Location</th>
                        <th>Update Status</th>
                        <th>SLA / Timer</th>
                        <th>Media</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        const socket = io("http://localhost:5000");
        const BASE_URL = "http://localhost:5000";

        const map = L.map('map').setView([28.61, 77.20], 10);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        function getSLA(createdAt) {
            const diffHours = (new Date() - new Date(createdAt)) / (1000 * 60 * 60);
            const remaining = (24 - diffHours).toFixed(1);
            if (remaining <= 0) return '<span class="sla-timer" style="color:#e74c3c;">🔥 OVERDUE</span>';
            return `<span class="sla-timer" style="color:#f39c12;">⏳ ${remaining}h left</span>`;
        }

        async function load() {
            const res = await fetch(`${BASE_URL}/complaints`);
            const data = await res.json();
            const tbody = document.getElementById("tableBody");
            tbody.innerHTML = "";

            data.forEach(c => {
                if(c.lat && c.lng) {
                    L.marker([c.lat, c.lng]).addTo(map).bindPopup(`<b>${c.department}</b><br>${c.text}`);
                }

                tbody.innerHTML += `
                    <tr>
                        <td style="color:#bcc1c8; font-size:11px; font-weight:bold;">#${c._id.slice(-5)}</td>
                        <td><span class="dept-badge">${c.department || 'General'}</span></td>
                        <td style="font-weight:600; color:#444;">${c.text}</td>
                        <td class="location-text"> ${c.location}</td>
                        <td>
                            <select class="status-select" onchange="updateStatus('${c._id}', this.value)">
                                <option value="Pending" ${c.status === 'Pending' ? 'selected' : ''}>Pending</option>
                                <option value="In Progress" ${c.status === 'In Progress' ? 'selected' : ''}>In Progress</option>
                                <option value="Resolved" ${c.status === 'Resolved' ? 'selected' : ''}>Resolved</option>
                            </select>
                        </td>
                        <td>${getSLA(c.createdAt)}</td>
                        <td>
                            ${c.image ? `<img src="${BASE_URL}/uploads/${c.image}" class="thumb">` : '<small style="color:#ccc">No Media</small>'}
                        </td>
                        <td>
                            <button class="delete-btn" onclick="del('${c._id}')"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>
                `;
            });
        }

        async function updateStatus(id, newStatus) {
            const res = await fetch(`${BASE_URL}/complaint/${id}`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ status: newStatus })
            });
            if(res.ok) {
                console.log("Status Updated");
                // Optional: socket alert bhej sakte hain
            }
        }

        async function del(id) {
            if(confirm("Are you sure you want to delete this complaint?")) {
                await fetch(`${BASE_URL}/complaint/${id}`, { method: "DELETE" });
                load();
            }
        }

        socket.on("newComplaint", load);
        load();
    </script>
</body>
</html>
